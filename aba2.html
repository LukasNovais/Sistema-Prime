<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Calcular Frete</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0d47a1; --google-blue: #1a73e8; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        .sidebar { width: 100%; max-width: 450px; background: white; padding: 10px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; z-index: 1000; flex-shrink: 0; height: 50vh; }
        #map { flex-grow: 1; width: 100%; height: 50vh; }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { height: 100vh; width: 380px; } #map { height: 100vh; } }
        .section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; margin-bottom: 8px; position: relative; }
        .title { font-size: 0.65rem; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #eee; display: block; }
        .input-std { width: 100%; height: 36px; border: 1px solid #ccc; border-radius: 6px; padding: 0 8px; box-sizing: border-box; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
        #sugestoes { position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; display: none; z-index: 5000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sugestao-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .sugestao-item:hover { background: #f0f0f0; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        .route-type { display: flex; background: #f0f0f0; border-radius: 6px; padding: 3px; margin: 5px 0; }
        .route-option { flex: 1; text-align: center; padding: 6px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .route-option.active { background: var(--primary); color: white; }
        .btn { width: 100%; height: 45px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; font-size: 13px; }
        .bg-calc { background: var(--success); color: white; }
        .ponto-card { background: #f8f9fa; border: 1px solid #ddd; padding: 6px; border-radius: 6px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; border-left: 4px solid var(--primary); }
        .ponto-btns { display: flex; gap: 3px; }
        .btn-mini { padding: 2px 5px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 3px; font-size: 10px; }
        .dre-box { background: #121212; color: #fff; border-radius: 10px; padding: 12px; margin-top: 5px; }
        .dre-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2a2a; font-size: 11px; }
        .val-destaque { font-size: 18px; color: #00e676; font-weight: 900; }
        .perc-tag { font-size: 9px; background: #333; padding: 1px 4px; border-radius: 3px; color: #aaa; margin-left: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center;"><h3 style="color: var(--primary); margin: 5px 0;">CALCULAR FRETE</h3></div>

    <div class="section">
        <span class="title">📍 Pontos de Rota</span>
        <div id="listaAtiva"></div>
        <div style="position:relative;">
            <input type="text" id="inputBusca" class="input-std" placeholder="Cidade ou Lat, Lon..." oninput="autoBusca(this.value)">
            <div id="sugestoes"></div>
        </div>
    </div>

    <div class="section">
        <span class="title">📊 Parâmetros Financeiros</span>
        <div class="route-type">
            <div id="optIda" class="route-option active" onclick="setTipoRota('ida')">SÓ IDA</div>
            <div id="optIdaVolta" class="route-option" onclick="setTipoRota('idavolta')">IDA E VOLTA</div>
        </div>
        <div class="grid-3">
            <div><label style="font-size:8px;">VALOR KM</label><input type="number" id="valorKm" class="input-std" value="5.70"></div>
            <div><label style="font-size:8px;">DIESEL</label><input type="number" id="diesel" class="input-std" value="7.20"></div>
            <div><label style="font-size:8px;">PEDÁGIO</label><input type="number" id="pedagioMan" class="input-std" value="0.00"></div>
            <div><label style="font-size:8px;">MÉDIA C.</label><input type="number" id="mediaC" class="input-std" value="3.5"></div>
            <div><label style="font-size:8px;">MÉDIA V.</label><input type="number" id="mediaV" class="input-std" value="3.7"></div>
            <div><label style="font-size:8px;">COMIS. %</label><input type="number" id="comissao" class="input-std" value="17"></div>
        </div>
        <button class="btn bg-calc" id="btnCalcular" onclick="calcularRotaORS()">🚀 CALCULAR ROTA</button>
    </div>

    <div id="resultadoDRE" class="dre-box" style="display:none;">
        <div class="dre-row">
            <span><b>KM Ida:</b> <span id="resKmIda">0</span></span>
            <span><b>KM Total (Giro):</b> <span id="resKmTotal">0</span></span>
        </div>
        <div class="dre-row" style="background: #1a1a1a; padding: 8px; border-radius: 6px; margin: 4px 0;">
            <span style="font-weight:bold; color:#81c784;">FRETE BRUTO:</span>
            <span id="resBruto" class="val-destaque">R$ 0,00</span>
        </div>
        <div class="dre-row"><span>Diesel:</span><span><span id="resDiesel">R$ 0</span><span class="perc-tag" id="pDiesel">0%</span></span></div>
        <div class="dre-row"><span>Comissão:</span><span><span id="resComissao">R$ 0</span><span class="perc-tag" id="pComissao">0%</span></span></div>
        <div class="dre-row"><span>Pedágio:</span><span><span id="resPedagio">R$ 0</span><span class="perc-tag" id="pPedagio">0%</span></span></div>
        <div class="dre-row" style="color: #ff8a80; font-weight: bold;"><span>DESPESA TOTAL:</span><span><span id="resTotalCustos">R$ 0</span><span class="perc-tag" id="pCustos">0%</span></span></div>
        <div class="dre-row" style="margin-top:8px; border-top:1px solid #444; padding-top:8px;">
            <span style="font-weight:bold; color:#00e676;">SALDO LIVRE:</span>
            <span><b id="resLucro" style="color:#00e676; font-size:16px;">R$ 0</b><span class="perc-tag" id="pLucro">0%</span></span>
        </div>
        <button class="btn" style="background:#25d366; color:white; margin-top:10px;" onclick="enviarWhatsApp()">📱 ENVIAR RESUMO WHATSAPP</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY_ORS = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImIzOTdjNjBlOTdkYTk4ZWNiYTg3MTBiZmYyZWZjNTZmN2E2YzY0NTgyZmE1YTk5ZDdjOTZkNTc5IiwiaCI6Im11cm11cjY0In0=';
    var googleRoads = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}');
    var googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}');
    var map = L.map('map', { center: [-16.68, -49.25], zoom: 5, layers: [googleRoads] });
    L.control.layers({ "Mapa Rodoviário": googleRoads, "Satélite": googleSatellite }).addTo(map);

    var pontos = [], marcadores = [], linhaRota = null, tipoRota = 'ida';

    map.on('click', e => { adicionar(e.latlng.lat, e.latlng.lng); });

    let timerBusca;
    function autoBusca(val) {
        clearTimeout(timerBusca);
        const divSug = document.getElementById('sugestoes');
        
        // CORREÇÃO: Verifica se é coordenada ANTES de buscar cidade
        let coords = val.split(',');
        if(coords.length === 2 && !isNaN(parseFloat(coords[0])) && !isNaN(parseFloat(coords[1]))) {
            divSug.style.display = 'none';
            // Se o usuário apertar Enter ou parar de digitar, ele pode adicionar o ponto exato
            return;
        }

        if(val.length < 3) { divSug.style.display = 'none'; return; }
        
        timerBusca = setTimeout(() => {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}&countrycodes=br&limit=5`)
            .then(r => r.json()).then(data => {
                let html = '';
                data.forEach(item => {
                    html += `<div class="sugestao-item" onclick="adicionar(${item.lat}, ${item.lon}, '${item.display_name.split(',')[0]}')">${item.display_name}</div>`;
                });
                divSug.innerHTML = html;
                divSug.style.display = 'block';
            });
        }, 400);
    }

    // Permitir adicionar via Enter para coordenadas exatas
    document.getElementById('inputBusca').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let val = this.value;
            let coords = val.split(',');
            if(coords.length === 2 && !isNaN(parseFloat(coords[0])) && !isNaN(parseFloat(coords[1]))) {
                adicionar(coords[0], coords[1], "Coord. Exata");
            }
        }
    });

    function adicionar(lat, lon, nomeManual = null) {
        let letra = String.fromCharCode(65 + pontos.length);
        let nome = nomeManual || "Ponto " + letra;
        pontos.push({ lat: parseFloat(lat), lon: parseFloat(lon), nome: nome });
        document.getElementById('sugestoes').style.display = 'none';
        document.getElementById('inputBusca').value = '';
        renderLista();
    }

    function renderLista() {
        marcadores.forEach(m => map.removeLayer(m)); marcadores = [];
        let h = '';
        pontos.forEach((p, i) => {
            h += `<div class="ponto-card"><span><b>${p.nome}</b></span><div class="ponto-btns"><button class="btn-mini" onclick="mover(${i}, -1)">▲</button><button class="btn-mini" onclick="mover(${i}, 1)">▼</button><button class="btn-mini" onclick="editar(${i})">✏️</button><button class="btn-mini" style="color:red" onclick="remover(${i})">✕</button></div></div>`;
            marcadores.push(L.marker([p.lat, p.lon]).addTo(map).bindPopup(p.nome));
        });
        document.getElementById('listaAtiva').innerHTML = h;
    }

    function mover(index, dir) {
        let nIdx = index + dir;
        if(nIdx >= 0 && nIdx < pontos.length) { [pontos[index], pontos[nIdx]] = [pontos[nIdx], pontos[index]]; renderLista(); }
    }
    function editar(i) { let n = prompt("Nome do ponto:", pontos[i].nome); if(n) { pontos[i].nome = n; renderLista(); } }
    function remover(i) { pontos.splice(i, 1); renderLista(); }

    async function calcularRotaORS() {
        if(pontos.length < 2) return alert("Selecione os pontos!");
        const btn = document.getElementById('btnCalcular');
        btn.innerText = "⏳ CALCULANDO..."; btn.disabled = true;
        let coords = pontos.map(p => [p.lon, p.lat]);
        if(tipoRota === 'idavolta') coords.push(coords[0]);
        try {
            const r = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': API_KEY_ORS },
                body: JSON.stringify({ coordinates: coords, radiuses: coords.map(() => 10000), preference: "fastest" })
            });
            const d = await r.json();
            const kmTotal = d.features[0].properties.summary.distance / 1000;
            if(linhaRota) map.removeLayer(linhaRota);
            linhaRota = L.geoJSON(d, { style: { color: '#0d47a1', weight: 6 } }).addTo(map);
            map.fitBounds(linhaRota.getBounds());
            exibirPainel(kmTotal);
        } catch (e) { alert("Erro na rota."); }
        btn.innerText = "🚀 CALCULAR ROTA"; btn.disabled = false;
    }

    function exibirPainel(kmTotal) {
        const vKm = parseFloat(document.getElementById('valorKm').value) || 0;
        const dVal = parseFloat(document.getElementById('diesel').value) || 0;
        const ped = parseFloat(document.getElementById('pedagioMan').value) || 0;
        const mC = parseFloat(document.getElementById('mediaC').value) || 1;
        const mV = parseFloat(document.getElementById('mediaV').value) || 1;
        const pCom = parseFloat(document.getElementById('comissao').value) || 0;

        let kmIda = (tipoRota === 'idavolta') ? kmTotal/2 : kmTotal;
        let giroTotal = (tipoRota === 'idavolta') ? kmTotal : kmIda * 2;
        let brutoReal = (tipoRota === 'ida' ? kmIda : giroTotal) * vKm;
        let brutoArredondado = Math.ceil(brutoReal / 100) * 100;
        
        let dieselCusto = ((kmIda/mC) + (kmIda/mV)) * dVal;
        let comissao = brutoArredondado * (pCom/100);
        let totalCustos = dieselCusto + comissao + ped;
        let saldo = brutoArredondado - totalCustos;

        const perc = (v) => brutoArredondado > 0 ? ((v/brutoArredondado)*100).toFixed(1) + '%' : '0%';

        document.getElementById('resKmIda').innerText = kmIda.toFixed(1) + " km";
        document.getElementById('resKmTotal').innerText = giroTotal.toFixed(1) + " km";
        document.getElementById('resBruto').innerText = "R$ " + brutoArredondado.toLocaleString('pt-BR');
        document.getElementById('resDiesel').innerText = "R$ " + dieselCusto.toLocaleString('pt-BR');
        document.getElementById('pDiesel').innerText = perc(dieselCusto);
        document.getElementById('resComissao').innerText = "R$ " + comissao.toLocaleString('pt-BR');
        document.getElementById('pComissao').innerText = perc(comissao);
        document.getElementById('resPedagio').innerText = "R$ " + ped.toLocaleString('pt-BR');
        document.getElementById('pPedagio').innerText = perc(ped);
        document.getElementById('resTotalCustos').innerText = "R$ " + totalCustos.toLocaleString('pt-BR');
        document.getElementById('pCustos').innerText = perc(totalCustos);
        document.getElementById('resLucro').innerText = "R$ " + saldo.toLocaleString('pt-BR');
        document.getElementById('pLucro').innerText = perc(saldo);
        document.getElementById('resultadoDRE').style.display = 'block';
    }

    function setTipoRota(t) {
        tipoRota = t;
        document.getElementById('optIda').classList.toggle('active', t === 'ida');
        document.getElementById('optIdaVolta').classList.toggle('active', t === 'idavolta');
    }

    function enviarWhatsApp() {
        let resumo = `*RESUMO DO FRETE*%0A` +
                     `🛣️ KM Total: ${document.getElementById('resKmTotal').innerText}%0A` +
                     `💰 Bruto: ${document.getElementById('resBruto').innerText}%0A` +
                     `⛽ Diesel: ${document.getElementById('resDiesel').innerText} (${document.getElementById('pDiesel').innerText})%0A` +
                     `🛑 Pedágio: ${document.getElementById('resPedagio').innerText}%0A` +
                     `💸 Saldo Livre: ${document.getElementById('resLucro').innerText}`;
        window.open(`https://api.whatsapp.com/send?text=${resumo}`);
    }
</script>
</body>
</html>
