<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Pro Mestre - ORS Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --primary: #1a237e; --google-blue: #1a73e8; --success: #2e7d32; --warning: #fbbc04; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        .sidebar { width: 100%; max-width: 450px; background: white; padding: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; z-index: 1000; flex-shrink: 0; height: 55vh; box-sizing: border-box; }
        #map { flex-grow: 1; width: 100%; height: 45vh; z-index: 1; }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { height: 100vh; width: 400px; }
            #map { height: 100vh; }
        }

        .section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .title { font-size: 0.75rem; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; display: block;}

        .input-std { width: 100%; height: 40px; border: 1px solid #ccc; border-radius: 6px; padding: 0 10px; box-sizing: border-box; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        
        #sugestoes { position: absolute; width: 90%; background: white; border: 1px solid #ccc; border-radius: 6px; max-height: 200px; overflow-y: auto; display: none; z-index: 3001; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .sugestao-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
        .sugestao-item:hover { background: #f5f5f5; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .route-type { display: flex; background: #f0f0f0; border-radius: 6px; padding: 4px; margin: 10px 0; }
        .route-option { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .route-option.active { background: var(--primary); color: white; }

        .btn { width: 100%; height: 42px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .bg-blue { background: var(--google-blue); color: white; }
        .bg-calc { background: var(--success); color: white; font-size: 14px; height: 50px; }
        
        .ponto-card { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; border-left: 5px solid var(--google-blue); }

        .dre-box { background: #1a1a1a; color: #fff; border-radius: 12px; padding: 18px; margin-top: 15px; }
        .dre-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .lucro-val { font-size: 22px; color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center;"><h2 style="color: var(--primary); margin: 10px 0;">LOGÍSTICA MASTER PRO</h2></div>

    <div class="section">
        <span class="title">📍 Destinos</span>
        <div style="position: relative;">
            <input type="text" id="busca" class="input-std" placeholder="Cidade + Enter para buscar" onkeypress="handleEnter(event)">
            <div id="sugestoes"></div>
        </div>
        <div id="listaAtiva" style="margin-top: 10px;"></div>
    </div>

    <div class="section">
        <span class="title">⚙️ Parâmetros Financeiros</span>
        <div class="route-type">
            <div id="optIda" class="route-option active" onclick="setTipoRota('ida')">SÓ IDA</div>
            <div id="optIdaVolta" class="route-option" onclick="setTipoRota('idavolta')">IDA E VOLTA</div>
        </div>
        <div class="grid-3">
            <div><label style="font-size:9px;">VALOR KM</label><input type="number" id="valorKm" class="input-std" value="5.70"></div>
            <div><label style="font-size:9px;">DIESEL</label><input type="number" id="diesel" class="input-std" value="7.20"></div>
            <div><label style="font-size:9px;">PEDÁGIO</label><input type="number" id="pedagioMan" class="input-std" value="0.00"></div>
            <div><label style="font-size:9px;">MÉDIA C.</label><input type="number" id="mediaC" class="input-std" value="3.5"></div>
            <div><label style="font-size:9px;">MÉDIA V.</label><input type="number" id="mediaV" class="input-std" value="3.7"></div>
            <div><label style="font-size:9px;">COMIS. %</label><input type="number" id="comissao" class="input-std" value="17"></div>
        </div>
        <button class="btn bg-calc" id="btnCalcular" onclick="calcularRotaORS()">🚀 CALCULAR ROTA PROFISSIONAL</button>
        <button class="btn" style="background:none; color:red; border:1px solid red;" onclick="limparTudo()">🗑️ LIMPAR</button>
    </div>

    <div id="resultadoDRE" class="dre-box" style="display:none;">
        <div class="dre-row"><span>Distância:</span><span id="resKmTotal">0 km</span></div>
        <div class="dre-row"><span>Frete Bruto:</span><span id="resBruto" style="color:#81c784;">R$ 0,00</span></div>
        <div class="dre-row"><span>Custo Diesel:</span><span id="resDiesel" style="color:#ff8a80;">R$ 0,00</span></div>
        <div class="dre-row"><span>Margem:</span><span id="resMargem" style="color:#81d4fa;">0%</span></div>
        <div class="dre-row" style="margin-top:10px; border-top:1px solid #444; padding-top:10px;">
            <span>LUCRO LÍQUIDO:</span><span id="resLucro" class="lucro-val">R$ 0,00</span>
        </div>
        <button class="btn" style="background:#25d366; color:white; margin-top:10px;" onclick="enviarZap()">📱 WHATSAPP</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // CONFIGURAÇÃO DA TUA CHAVE API
    const API_KEY_ORS = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImIzOTdjNjBlOTdkYTk4ZWNiYTg3MTBiZmYyZWZjNTZmN2E2YzY0NTgyZmE1YTk5ZDdjOTZkNTc5IiwiaCI6Im11cm11cjY0In0=';

    var map = L.map('map').setView([-16.68, -49.25], 5);
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);

    var pontos = [];
    var marcadores = [];
    var linhaRota = null;
    var tipoRota = 'ida';

    function setTipoRota(t) {
        tipoRota = t;
        document.getElementById('optIda').classList.toggle('active', t === 'ida');
        document.getElementById('optIdaVolta').classList.toggle('active', t === 'idavolta');
    }

    function handleEnter(e) {
        if(e.key === 'Enter') {
            let q = document.getElementById('busca').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=br&limit=5`)
                .then(r => r.json()).then(data => {
                    let h = '';
                    data.forEach(i => {
                        h += `<div class="sugestao-item" onclick="adicionar(${i.lat},${i.lon},'${i.display_name.split(',')[0]}')">${i.display_name}</div>`;
                    });
                    document.getElementById('sugestoes').innerHTML = h;
                    document.getElementById('sugestoes').style.display = 'block';
                });
        }
    }

    function adicionar(lat, lon, nome) {
        pontos.push({ lat: lat, lon: lon, nome: nome });
        document.getElementById('sugestoes').style.display = 'none';
        document.getElementById('busca').value = '';
        renderLista();
    }

    function renderLista() {
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        let html = '';
        pontos.forEach((p, i) => {
            html += `<div class="ponto-card"><span><b>${i==0?'🏁':'📍'}</b> ${p.nome}</span><button onclick="remover(${i})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">✕</button></div>`;
            marcadores.push(L.marker([p.lat, p.lon]).addTo(map));
        });
        document.getElementById('listaAtiva').innerHTML = html;
        if(pontos.length > 0) map.panTo([pontos[pontos.length-1].lat, pontos[pontos.length-1].lon]);
    }

    async function calcularRotaORS() {
        if(pontos.length < 2) return alert("Adicione origem e destino!");
        
        const btn = document.getElementById('btnCalcular');
        btn.innerText = "🔄 CALCULANDO ROTA CAMIÃO...";
        btn.disabled = true;

        let coords = pontos.map(p => [parseFloat(p.lon), parseFloat(p.lat)]);
        if(tipoRota === 'idavolta') coords.push(coords[0]);

        const body = {
            coordinates: coords,
            elevation: false,
            extra_info: ["surface", "steepness"]
        };

        try {
            const response = await fetch('https://api.openrouteservice.org/v2/directions/driving-hgv/geojson', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': API_KEY_ORS
                },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            const route = data.features[0];
            const kmTotal = route.properties.summary.distance / 1000;

            if(linhaRota) map.removeLayer(linhaRota);
            linhaRota = L.geoJSON(data, { style: { color: '#00e676', weight: 6 } }).addTo(map);
            map.fitBounds(linhaRota.getBounds());

            exibirDRE(kmTotal);
        } catch (e) {
            alert("Erro ao calcular. Verifica se a tua chave API está ativa no site do OpenRoute.");
        } finally {
            btn.innerText = "🚀 CALCULAR ROTA PROFISSIONAL";
            btn.disabled = false;
        }
    }

    function exibirDRE(kmTotal) {
        const vKm = parseFloat(document.getElementById('valorKm').value);
        const diesel = parseFloat(document.getElementById('diesel').value);
        const mC = parseFloat(document.getElementById('mediaC').value);
        const mV = parseFloat(document.getElementById('mediaV').value);
        const comissao = parseFloat(document.getElementById('comissao').value) / 100;
        const pedagio = parseFloat(document.getElementById('pedagioMan').value);

        let kmIda = (tipoRota === 'idavolta') ? kmTotal/2 : kmTotal;
        let giroTotal = (tipoRota === 'idavolta') ? kmTotal : kmIda * 2;

        let bruto = (tipoRota === 'ida') ? (kmIda * vKm) : (giroTotal * vKm);
        let custoDiesel = ((kmIda/mC) + (kmIda/mV)) * diesel;
        let valorComissao = bruto * comissao;
        let lucro = bruto - custoDiesel - pedagio - valorComissao;
        let margem = (lucro / bruto) * 100;

        document.getElementById('resKmTotal').innerText = kmTotal.toFixed(1) + " km";
        document.getElementById('resBruto').innerText = "R$ " + bruto.toLocaleString('pt-BR');
        document.getElementById('resDiesel').innerText = "R$ " + custoDiesel.toLocaleString('pt-BR');
        document.getElementById('resLucro').innerText = "R$ " + lucro.toLocaleString('pt-BR');
        document.getElementById('resMargem').innerText = margem.toFixed(1) + "%";
        document.getElementById('resultadoDRE').style.display = 'block';
    }

    function remover(i) { pontos.splice(i, 1); renderLista(); }
    function limparTudo() { pontos = []; renderLista(); if(linhaRota) map.removeLayer(linhaRota); document.getElementById('resultadoDRE').style.display='none'; }
    function enviarZap() {
        let msg = `*RESUMO LOGÍSTICA*%0A*Bruto:* ${document.getElementById('resBruto').innerText}%0A*Lucro:* ${document.getElementById('resLucro').innerText}%0A*Distância:* ${document.getElementById('resKmTotal').innerText}`;
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }
</script>
</body>
</html>
