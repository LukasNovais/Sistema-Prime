<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prime Transportadora - O.C.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #1a365d; --secondary: #2c5282; --success: #27ae60;
            --danger: #c0392b; --bg: #f4f7f6; --text: #2d3748; --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; }

        .app-shell { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 800px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .card-header { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #718096; margin-bottom: 6px; text-transform: uppercase; }
        .form-group input, .form-group select { 
            width: 100%; height: 55px; padding: 0 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 17px; font-weight: 600; text-transform: uppercase; outline: none; background: #fff;
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 60px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-success { background: var(--success); color: white; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; height: 70px; font-size: 18px; margin-top: 10px; }
        .btn-danger-outline { background: transparent; border: 2px solid var(--danger); color: var(--danger); height: 45px; font-size: 11px; margin-top: 10px; }

        .checkbox-container { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--primary); margin-top: 5px; }
        .checkbox-container input { width: 22px; height: 22px; }

        /* TICKET - DESIGN PARA IMAGEM */
        .preview-section { width: 100%; overflow-x: auto; padding: 15px 0; }
        .ticket-wrapper { background: #fff; padding: 25px; border-radius: 4px; border: 1px solid #ddd; min-width: 650px; margin: 0 auto; }
        .document-table { width: 100%; border-collapse: collapse; border: 4px solid #000; table-layout: fixed; } 
        .document-table td { border: 2px solid #000; vertical-align: middle; }
        
        .ticket-header { text-align: center; padding: 20px; border-bottom: 4px solid #000 !important; }
        .ticket-doc-title { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; }
        .ticket-header h1 { font-size: 32px; font-weight: 900; color: #000; }
        
        .ticket-lbl-row { padding: 15px 20px; border-bottom: 2px solid #000; display: flex; align-items: baseline; gap: 12px; }
        .ticket-lbl { font-size: 12px; font-weight: bold; color: #333; text-transform: uppercase; min-width: 110px; }
        .ticket-val { font-size: 20px; font-weight: bold; color: #000; text-transform: uppercase; }

        .col-produtos { width: 40%; vertical-align: middle !important; background: #fff; text-align: center; padding: 0 !important; overflow: hidden; }
        .ticket-prod-item { border-bottom: 2px solid #000; width: 100%; box-sizing: border-box; transition: all 0.2s; }
        .ticket-prod-item:last-child { border-bottom: none; }
        .ticket-prod-title { font-weight: 900; background: #f0f0f0; padding: 6px; border-bottom: 1px solid #000; text-transform: uppercase; color: #000; }
        .ticket-prod-val { font-weight: 900; color: #d00; font-family: 'Inter', sans-serif; }

        #snackbar { visibility: hidden; min-width: 280px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 18px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; }
        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body onload="iniciarAppNativa()">

<div class="app-shell">
    <div class="card">
        <div class="card-header"><i class="fas fa-file-invoice"></i> Identificação</div>
        <div class="grid-inputs">
            <div class="form-group"><label>Data</label><input type="text" id="in-data" readonly></div>
            <div class="form-group"><label>ID Interna</label><input type="text" id="in-id-interna" readonly></div>
        </div>
        <div class="form-group"><label>Distribuidora</label><input type="text" id="in-distribuidora" oninput="atualizarDados()"></div>
        <div class="form-group"><label>Cliente</label><input type="text" id="in-cliente" oninput="atualizarDados()"></div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-id-card"></i> Motorista e Placa</div>
        <div class="form-group">
            <label>Nome (Autocomplete)</label>
            <input type="text" id="in-motorista" list="lista-motoristas" oninput="verificarMotorista(this.value); atualizarDados()">
        </div>
        <div class="grid-inputs">
            <div class="form-group"><label>CPF</label><input type="text" id="in-cpf" oninput="atualizarDados()"></div>
            <div class="form-group"><label>Placa do Cavalo</label><input type="text" id="in-placa" oninput="atualizarDados()"></div>
        </div>
        <div class="form-group"><label>Lacres</label><input type="text" id="in-lacre" oninput="atualizarDados()"></div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-gas-pump"></i> Adicionar Produtos</div>
        <div class="form-group"><label>Tipo</label>
            <select id="sel-tipo">
                <option value="GASOLINA C">GASOLINA</option>
                <option value="ETANOL">ETANOL</option>
                <option value="DIESEL S500">DIESEL S500</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>
        <div class="form-group"><label>Volume (Litros)</label><input type="number" id="sel-vol" placeholder="Ex: 10000"></div>
        <label class="checkbox-container"><input type="checkbox" id="sel-adit"> PRODUTO ADITIVADO</label>
        <button class="btn btn-success" onclick="addProduto()"><i class="fas fa-plus"></i> Adicionar Produto</button>
        <button class="btn btn-danger-outline" onclick="resetProdutos()"><i class="fas fa-trash-alt"></i> Limpar Lista</button>
    </div>

    <button class="btn btn-primary" onclick="exportarImagem()"><i class="fas fa-download"></i> Gerar Ordem de Carregamento</button>

    <div class="preview-section">
        <div class="ticket-wrapper" id="area-impressao">
            <table class="document-table">
                <tr>
                    <td colspan="3" class="ticket-header">
                        <div class="ticket-doc-title"><span>Ordem de Carregamento</span><span id="out-id-interna">ID: 000000</span></div>
                        <h1>PRIME TRANSPORTADORA</h1>
                        <div class="ticket-header-info">CNPJ 35.977.084/0001-00 | 62.99941-2539</div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="width: 60%; vertical-align: top; padding: 0;">
                        <div class="ticket-lbl-row"><span class="ticket-lbl">DATA:</span><span class="ticket-val" id="out-data"></span></div>
                        <div class="ticket-lbl-row"><span class="ticket-lbl">DISTRIB:</span><span class="ticket-val" id="out-distribuidora"></span></div>
                        <div class="ticket-lbl-row"><span class="ticket-lbl">CLIENTE:</span><span class="ticket-val" id="out-cliente"></span></div>
                        <div style="display: flex; border-bottom: 2px solid #000;">
                            <div style="flex: 1.3; padding: 12px 15px; border-right: 2px solid #000;"><span class="ticket-lbl">MOTORISTA:</span><br><span class="ticket-val" id="out-motorista"></span></div>
                            <div style="flex: 1; padding: 12px 15px;"><span class="ticket-lbl">CPF:</span><br><span class="ticket-val" id="out-cpf"></span></div>
                        </div>
                        <div style="display: flex;">
                            <div style="flex: 1; padding: 12px 15px; border-right: 2px solid #000;"><span class="ticket-lbl">PLACA:</span><br><span class="ticket-val" id="out-placa" style="font-size: 26px;"></span></div>
                            <div style="flex: 1; padding: 12px 15px;"><span class="ticket-lbl">LACRES:</span><br><span class="ticket-val" id="out-lacre"></span></div>
                        </div>
                    </td>
                    <td class="col-produtos" id="out-lista-produtos"></td>
                </tr>
            </table>
        </div>
    </div>
</div>

<datalist id="lista-motoristas"></datalist>
<div id="snackbar"></div>

<script>
    let listaProdutos = [];
    let bancoDeDadosLocal = {};
    let isGAS = (typeof google !== 'undefined' && google.script);

    function iniciarAppNativa() {
        definirData(); gerarID();
        if (isGAS) {
            google.script.run.withSuccessHandler(function(dados) {
                bancoDeDadosLocal = dados;
                const dnM = document.getElementById('lista-motoristas');
                Object.keys(dados).forEach(n => { dnM.innerHTML += `<option value="${n}">`; });
            }).getDadosCompletos();
        }
    }

    function definirData() {
        const f = new Date().toLocaleDateString('pt-BR');
        document.getElementById('in-data').value = f;
        document.getElementById('out-data').innerText = f;
    }

    function gerarID() {
        const id = Date.now().toString().slice(-6);
        document.getElementById('in-id-interna').value = id;
        document.getElementById('out-id-interna').innerText = 'ID: ' + id;
    }

    function verificarMotorista(v) {
        const n = v.trim().toUpperCase();
        if (bancoDeDadosLocal[n]) {
            document.getElementById('in-cpf').value = bancoDeDadosLocal[n].cpf;
            document.getElementById('in-placa').value = bancoDeDadosLocal[n].placa;
            showSnackbar("Motorista Reconhecido!", 1500);
            setTimeout(atualizarDados, 100); 
        }
    }

    function atualizarDados() {
        ['distribuidora', 'cliente', 'motorista', 'cpf', 'placa', 'lacre'].forEach(c => {
            document.getElementById('out-' + c).innerText = document.getElementById('in-' + c).value;
        });
    }

    function addProduto() {
        const t = document.getElementById('sel-tipo').value;
        const v = document.getElementById('sel-vol').value;
        const a = document.getElementById('sel-adit').checked;
        if (!v || v <= 0) return;

        let n = t;
        if (a) {
            if (t.includes("GASOLINA")) n = "GASOLINA ADIT.";
            else if (t.includes("S500")) n = "S500 ADIT.";
            else if (t.includes("S10")) n = "S10 ADIT.";
            else n = t + " ADIT.";
        }

        listaProdutos.push({ nome: n, volume: v });
        document.getElementById('sel-vol').value = '';
        document.getElementById('sel-adit').checked = false;
        renderizarProdutos();
    }

    function renderizarProdutos() {
        const container = document.getElementById('out-lista-produtos');
        container.innerHTML = '';
        const total = listaProdutos.length;
        
        let fTitle = "14px", fVal = "36px", pItem = "20px";
        if (total > 2) { fTitle = "11px"; fVal = "28px"; pItem = "12px"; }
        if (total > 3) { fTitle = "10px"; fVal = "22px"; pItem = "8px"; }
        if (total > 4) { fTitle = "9px"; fVal = "18px"; pItem = "5px"; }

        listaProdutos.forEach(p => {
            const div = document.createElement('div');
            div.className = 'ticket-prod-item';
            div.style.padding = `${pItem} 5px`;
            div.innerHTML = `<div class="ticket-prod-title" style="font-size:${fTitle}">${p.nome}</div><div class="ticket-prod-val" style="font-size:${fVal}">${p.volume}</div>`;
            container.appendChild(div);
        });
    }

    function resetProdutos() {
        listaProdutos = []; renderizarProdutos();
        showSnackbar("Lista limpa", 1000);
    }

    function exportarImagem() {
        const cl = document.getElementById('in-cliente').value || 'CLIENTE';
        const mot = document.getElementById('in-motorista').value || 'MOTORISTA';
        const pl = document.getElementById('in-placa').value || 'PLACA';
        
        if (isGAS && mot) {
            google.script.run.salvarOuAtualizar(mot, document.getElementById('in-cpf').value, pl);
        }

        showSnackbar("Processando O.C...", 3000);
        html2canvas(document.getElementById('area-impressao'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `O.C: (${cl}_${mot}_${pl}).jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
            gerarID();
            showSnackbar("Download Concluído!", 2000);
        });
    }

    function showSnackbar(m, t) {
        const s = document.getElementById("snackbar");
        s.innerText = m; s.className = "show";
        setTimeout(() => { s.className = ""; }, t);
    }
</script>
</body>
</html>
