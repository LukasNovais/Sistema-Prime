<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Executivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 130px); width: 100%; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        .nav-button.active { color: #3b82f6; border-top: 3px solid #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <span class="text-xs font-bold tracking-[0.2em] text-slate-400 uppercase">System Intelligence</span>
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </header>

    <main class="flex-grow overflow-hidden">
        
        <section id="aba1" class="tab-content active">
            <iframe src="aba1.html"></iframe>
        </section>

        <section id="aba2" class="tab-content">
            <iframe src="aba2.html"></iframe>
        </section>

        <section id="aba3" class="tab-content">
            <iframe src="aba3.html"></iframe>
        </section>

    </main>

    <nav class="bg-white/90 backdrop-blur-lg border-t border-slate-200 flex justify-around items-center h-20 pb-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="openTab('aba1', this)" class="nav-button active flex flex-col items-center justify-center w-full h-full text-slate-400 transition-all">
            <i class="fa-solid fa-rocket text-xl mb-1"></i>
            <span class="text-[10px] font-medium uppercase tracking-widest">Dashboard</span>
        </button>
        
        <button onclick="openTab('aba2', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-400 transition-all">
            <i class="fa-solid fa-microchip text-xl mb-1"></i>
            <span class="text-[10px] font-medium uppercase tracking-widest">Dados</span>
        </button>
        
        <button onclick="openTab('aba3', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-400 transition-all">
            <i class="fa-solid fa-user-shield text-xl mb-1"></i>
            <span class="text-[10px] font-medium uppercase tracking-widest">Perfil</span>
        </button>
    </nav>

    <script>
        function openTab(tabId, btn) {
            // Esconde todas as abas
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Remove destaque dos botões
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            
            // Mostra a selecionada
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
