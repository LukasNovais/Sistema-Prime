<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Transportadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Esconder Scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        /* Estrutura de Abas */
        .tab-content { display: none; height: calc(100vh - 145px); width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        iframe { width: 100%; height: 100%; border: none; border-radius: 12px; }

        /* Animação */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botão Ativo - Tema Rodoviário (Amarelo e Grafite) */
        .nav-button.active { 
            color: #f59e0b; 
            border-top: 4px solid #f59e0b; 
            background: linear-gradient(to bottom, rgba(245, 158, 11, 0.1), transparent);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 flex flex-col h-screen overflow-hidden">

    <header class="bg-[#1e293b]/50 backdrop-blur-xl border-b border-slate-700/50 p-5 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-lg">
                    <i class="fa-solid fa-truck-fast text-[#0f172a] text-xl"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter uppercase italic">Sistema Prime<span class="text-amber-500 text-[10px] not-italic">v2.6</span></h1>
                    <p class="text-[10px] text-slate-400 font-medium">CENTRAL DE OPERAÇÕES</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-600/50">
                <div class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></div>
                <span class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Conectado</span>
            </div>
        </div>
    </header>

    <main class="flex-grow p-3">
        
        <section id="aba1" class="tab-content active">
            <iframe src="aba1.html"></iframe>
        </section>

        <section id="aba2" class="tab-content">
            <iframe src="aba2.html"></iframe>
        </section>

        <section id="aba3" class="tab-content">
            <iframe src="aba3.html"></iframe>
        </section>

    </main>

    <nav class="bg-[#1e293b]/80 backdrop-blur-2xl border-t border-slate-700/50 flex justify-around items-center h-24 pb-6 shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
        
        <button onclick="openTab('aba1', this)" class="nav-button active flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all duration-300">
            <i class="fa-solid fa-route text-2xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Tabela</span>
        </button>
        
        <button onclick="openTab('aba2', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all duration-300">
            <i class="fa-solid fa-boxes-stacked text-2xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Calculadora</span>
        </button>
        
        <button onclick="openTab('aba3', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all duration-300">
            <i class="fa-solid fa-gears text-2xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Ordem</span>
        </button>
        
    </nav>

    <script>
        function openTab(tabId, btn) {
            // Vibração tátil leve (funciona em alguns celulares Android)
            if (navigator.vibrate) navigator.vibrate(10);

            // Esconde todas as abas com efeito suave
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            // Reseta estilo dos botões
            document.querySelectorAll('.nav-button').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-slate-500');
            });
            
            // Ativa a aba e o botão atual
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            btn.classList.remove('text-slate-500');
        }
    </script>
</body>
</html>
