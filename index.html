<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PRIME APP V4</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --primary: #1a365d; --accent: #f39c12; --success: #27ae60; 
            --bg: #ffffff; --card-bg: #f8fafc; --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            height: 100dvh; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            color: var(--text);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .app-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .view { display: none; width: 100%; max-width: 800px; margin: 0 auto; }
        .view.active { display: block; }

        .nav-bottom { 
            display: flex; 
            background: var(--primary); 
            height: 75px; 
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
        }
        .nav-item.active { 
            color: var(--accent);
            background: rgba(255,255,255,0.05);
            border-top: 4px solid var(--accent);
        }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .app-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        
        input, select { 
            width: 100%; 
            height: 60px; 
            padding: 0 15px; 
            border: 2px solid #cbd5e1; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700;
            margin-bottom: 15px;
            background: white;
        }

        .frete-row { 
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .veiculo-tag { font-size: 14px; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        
        .valor-gigante { 
            font-size: clamp(28px, 9vw, 42px); 
            font-weight: 900; 
            color: var(--success); 
            display: block;
            margin: 5px 0;
            white-space: nowrap;
        }
        .valor-litro {
            font-size: 18px;
            font-weight: 800;
            color: #1a365d;
            background: #eef2f7;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .antt-info { font-size: 12px; color: #64748b; font-weight: 600; }

        .btn-app {
            background: var(--primary);
            color: white;
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #map-view { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .map-overlay { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000; }

        @media (min-width: 1024px) {
            .nav-bottom { height: 100vh; width: 100px; flex-direction: column; position: fixed; left: 0; top: 0; }
            body { padding-left: 100px; }
            .nav-item { border-top: none; border-left: 5px solid transparent; }
            .nav-item.active { border-top: none; border-left: 5px solid var(--accent); }
        }
    </style>
</head>
<body>

<header>PRIME TRANSPORTES</header>

<main class="app-content">
    <section id="view-tabela" class="view active">
        <div class="app-card">
            <select id="sel-cidade" onchange="App.calcCidade(this.value)">
                <option>Carregando cidades...</option>
            </select>
            <input type="number" id="inp-km" placeholder="KM de ida..." oninput="App.calcKm(this.value)">
            <div id="box-giro" style="display:none; text-align:center; background:var(--primary); color:white; padding:10px; border-radius:10px;">
                <span style="font-size:11px; font-weight:800;">GIRO TOTAL</span><br>
                <b id="txt-giro" style="font-size:24px">0</b> KM
            </div>
        </div>
        <div id="lista-precos"></div>
    </section>

    <section id="view-mapa" class="view" style="height:100%; position:relative;">
        <div class="map-overlay">
            <div class="app-card">
                <input type="text" id="map-search" placeholder="Cidade..." onkeypress="App.searchMap(event)" style="margin-bottom:8px; height:50px">
                <button class="btn-app" style="height:50px" onclick="App.sendZap()">WHATSAPP</button>
            </div>
        </div>
        <div id="map-view"></div>
    </section>

    <section id="view-ordem" class="view">
        <div class="app-card">
            <input type="text" id="o-mot" placeholder="MOTORISTA">
            <input type="text" id="o-pla" placeholder="PLACA">
            <button class="btn-app" onclick="App.gerarOrdem()">GERAR ORDEM</button>
        </div>
    </section>
</main>

<nav class="nav-bottom">
    <a href="#" class="nav-item active" onclick="App.router('tabela', this)">
        <i class="fas fa-money-check-alt"></i>
        <span>Tabela</span>
    </a>
    <a href="#" class="nav-item" onclick="App.router('mapa', this)">
        <i class="fas fa-map-marked-alt"></i>
        <span>Mapa</span>
    </a>
    <a href="#" class="nav-item" onclick="App.router('ordem', this)">
        <i class="fas fa-file-signature"></i>
        <span>Ordem</span>
    </a>
</nav>

<script>
const App = {
    data: null,
    init: function() {
        const script = document.createElement('script');
        script.src = 'https://script.google.com/macros/s/AKfycbx8wr0xEwFVEvBRaEkcHu_2TFwH_KN8zFcoD4x2023PzqqucGFUhz2rxfOXfdIe7B_w/exec?callback=App.setup';
        document.body.appendChild(script);

        this.map = L.map('map-view', {zoomControl: false}).setView([-16.68, -49.25], 5);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(this.map);
    },
    setup: function(d) {
        this.data = d;
        const sel = document.getElementById('sel-cidade');
        let h = '<option value="">LISTA CIDADES...</option>';
        d.cidades.filter(c => c[0]).sort((a,b)=>a[0].localeCompare(b[0])).forEach((c, i) => {
            h += `<option value="${i}">${c[0]} (${c[1]} KM)</option>`;
        });
        sel.innerHTML = h;
    },
    router: function(id, el) {
        document.querySelectorAll('.view, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'mapa') setTimeout(() => this.map.invalidateSize(), 300);
    },
    calcCidade: function(idx) {
        if(!idx) return;
        const row = this.data.cidades[idx];
        this.render(parseFloat(row[1]), row);
    },
    calcKm: function(km) {
        if(!km) return;
        const v = parseFloat(km);
        const row = this.data.cidades.reduce((p, c) => Math.abs(c[1]-v) < Math.abs(p[1]-v) ? c : p);
        this.render(v, row);
    },
    render: function(kmIda, row) {
        document.getElementById('box-giro').style.display = 'block';
        document.getElementById('txt-giro').innerText = (kmIda * 2);
        const veics = [
            {n:'Toco', e:2, col:2, cap:10000}, 
            {n:'Truck', e:3, col:3, cap:15000}, 
            {n:'Bitruck', e:4, col:4, cap:20000}, 
            {n:'Carreta', e:5, col:5, cap:30000}
        ];
        let h = '';
        veics.forEach(v => {
            const c = this.data.antt[v.e];
            const vMin = (kmIda * c.ccd + c.cc) + (kmIda * c.ccd * 0.92);
            let pP = typeof row[v.col] === 'string' ? parseFloat(row[v.col].replace(/\./g,'').replace(',','.')) : row[v.col];
            
            // Cálculo do Valor por Litro
            const vLitro = pP / v.cap;

            h += `<div class="frete-row">
                <span class="veiculo-tag">${v.n}</span>
                <span class="valor-gigante">R$ ${pP.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
                <div class="valor-litro">R$ ${vLitro.toLocaleString('pt-BR',{minimumFractionDigits:4})} /L</div>
                <div class="antt-info">Mínimo ANTT: R$ ${vMin.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
            </div>`;
        });
        document.getElementById('lista-precos').innerHTML = h;
    }
};
window.onload = () => App.init();
</script>
</body>
</html>
