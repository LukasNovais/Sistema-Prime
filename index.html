<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Prime Logística - Mobile Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { 
            --primary: #1a365d; --blue: #004a99; --success: #2e7d32; 
            --orange: #f39c12; --bg: #f8fafc; --danger: #d32f2f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* Ajuste de Fonte Base para Celular */
        html { font-size: 16px; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVEGAÇÃO: Botões Maiores */
        .nav-tabs { 
            display: flex; background: var(--primary); z-index: 2000; 
            border-bottom: 4px solid var(--orange); min-height: 65px;
        }
        .tab-btn { 
            flex: 1; padding: 10px; border: none; background: none; 
            color: rgba(255,255,255,0.8); cursor: pointer; 
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        }
        .tab-btn i { font-size: 18px; }
        .tab-btn.active { background: var(--bg); color: var(--primary); }

        /* CONTEÚDO */
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 15px; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .app-grid { width: 100%; max-width: 1400px; margin: auto; }
        
        @media (min-width: 992px) {
            .app-grid { display: flex; flex-direction: row; gap: 25px; padding: 20px; }
            .sidebar { width: 420px; }
            .main-panel { flex: 1; }
        }

        /* FORMULÁRIOS AMPLIADOS (Touch Friendly) */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 900; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        /* Inputs e Selects com 60px de altura para fácil toque */
        input, select { 
            width: 100%; height: 60px; padding: 0 18px; 
            border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 18px; font-weight: 600; outline: none; margin-bottom: 15px;
            background-color: #fff; appearance: none;
        }
        input:focus { border-color: var(--blue); background: #f0f7ff; }

        /* LISTA DE RESULTADOS: FONTE GRANDE */
        .item-tab { padding: 20px 0; border-bottom: 2px solid #f1f5f9; }
        .veiculo-info b { font-size: 18px; color: var(--primary); display: block; }
        .veiculo-info small { font-size: 13px; color: #64748b; font-weight: 700; }
        
        .price-final { 
            font-size: 38px; /* Valor em destaque total */
            font-weight: 900; color: var(--success); 
            display: block; line-height: 1; margin: 8px 0;
        }
        .alerta-lei { 
            background: #fff5f5; color: var(--danger); font-size: 12px; font-weight: 900; 
            padding: 4px 10px; border-radius: 6px; border: 1px solid #feb2b2;
        }

        /* BOTÕES DE AÇÃO */
        .btn-action {
            width: 100%; height: 65px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 10px rgba(26, 54, 93, 0.3);
        }

        /* MAPA */
        #map-container { height: 450px; width: 100%; border-radius: 15px; z-index: 1; border: 2px solid #fff; }

        /* ORDEM PREVIEW */
        .ord-scroll { overflow-x: auto; padding: 10px; background: #cbd5e0; border-radius: 15px; }
        .ord-print { background: white; width: 600px; padding: 35px; border: 4px solid #000; margin: auto; }
    </style>
</head>
<body>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="Router.switch('tabela')"><i class="fas fa-list-ol"></i><span>Tabela</span></button>
    <button class="tab-btn" onclick="Router.switch('mapa')"><i class="fas fa-route"></i><span>Mapa</span></button>
    <button class="tab-btn" onclick="Router.switch('ordem')"><i class="fas fa-file-invoice"></i><span>Ordem</span></button>
</nav>

<section id="tab-tabela" class="tab-content active">
    <div class="app-grid">
        <div class="sidebar">
            <div class="card">
                <label>Selecione o Destino</label>
                <select id="tab-selCidade" onchange="TabApp.porCidade(this.value)"><option>Carregando...</option></select>
                <label>KM Ida (Manual)</label>
                <input type="number" id="tab-kmMan" placeholder="Ex: 150" oninput="TabApp.porKm(this.value)">
                <div id="tab-kmBox" style="display:none; background:var(--primary); color:white; padding:15px; border-radius:12px; text-align:center;">
                    <small style="text-transform:uppercase; font-weight:700">Giro Total (Ida+Volta)</small><br>
                    <span id="tab-kmTotal" style="font-weight:900; font-size:28px;">0</span> <span style="font-size:14px">KM</span>
                </div>
            </div>
        </div>
        <div class="main-panel">
            <div class="card" id="tab-lista">
                <p style="text-align:center; color:#94a3b8; padding:30px; font-weight:600">Escolha um destino acima.</p>
            </div>
        </div>
    </div>
</section>

<section id="tab-mapa" class="tab-content">
    <div class="app-grid">
        <div class="sidebar">
            <div class="card">
                <label>Cidade / Local</label>
                <input type="text" id="map-busca" placeholder="Digite e aperte Enter" onkeypress="MapApp.handleEnter(event)">
                <div id="map-sugestoes" style="background:#fff; border-radius:10px; display:none; margin-top:-10px; margin-bottom:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);"></div>
                <button class="btn-action" style="background:var(--success)" onclick="MapApp.whatsapp()">Enviar p/ WhatsApp</button>
            </div>
        </div>
        <div class="main-panel">
            <div id="map-container"></div>
        </div>
    </div>
</section>

<section id="tab-ordem" class="tab-content">
    <div class="app-grid">
        <div class="sidebar">
            <div class="card">
                <label>Dados Principais</label>
                <input type="text" id="ord-mot" placeholder="NOME DO MOTORISTA" oninput="OrdApp.sync()">
                <input type="text" id="ord-pla" placeholder="PLACA" oninput="OrdApp.sync()">
                <div style="display:flex; gap:10px">
                    <select id="ord-tipo" style="flex:2"><option>GASOLINA C</option><option>ETANOL</option><option>DIESEL S10</option></select>
                    <input type="number" id="ord-vol" placeholder="LTS" style="flex:1">
                </div>
                <button class="btn-action" style="background:var(--blue)" onclick="OrdApp.addProd()">+ Adicionar Produto</button>
                <button class="btn-action" onclick="OrdApp.exportar()">Gerar Imagem JPG</button>
            </div>
        </div>
        <div class="main-panel">
            <div class="ord-scroll">
                <div id="ord-canvas" class="ord-print">
                    <h1 style="text-align:center; font-size:40px; font-weight:900">PRIME TRANSPORTADORA</h1>
                    <div style="border-bottom:5px solid #000; margin:20px 0"></div>
                    <p style="font-size:24px; margin-bottom:10px"><b>MOTORISTA:</b> <span id="v-mot">---</span></p>
                    <p style="font-size:24px; margin-bottom:20px"><b>PLACA:</b> <span id="v-pla">---</span></p>
                    <div id="v-prods" style="border:4px solid #000"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
const Router = {
    switch: (id) => {
        document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
        document.querySelector(`[onclick="Router.switch('${id}')"]`).classList.add('active');
        document.getElementById(`tab-${id}`).classList.add('active');
        if(id === 'mapa') setTimeout(() => MapApp.map.invalidateSize(), 300);
    }
};

const TabApp = {
    api: 'https://script.google.com/macros/s/AKfycbx8wr0xEwFVEvBRaEkcHu_2TFwH_KN8zFcoD4x2023PzqqucGFUhz2rxfOXfdIe7B_w/exec',
    base: null,
    init: function() {
        const s = document.createElement('script');
        s.src = `${this.api}?callback=TabApp.setup`;
        document.body.appendChild(s);
    },
    setup: function(d) {
        this.base = d;
        const sel = document.getElementById('tab-selCidade');
        let h = '<option value="">CIDADES NO BANCO...</option>';
        d.cidades.filter(c => c[0]).sort((a,b)=>a[0].localeCompare(b[0])).forEach((c, i) => {
            h += `<option value="${i}">${c[0]} (${c[1]} KM)</option>`;
        });
        sel.innerHTML = h;
    },
    porCidade: function(i) { if(i) this.calc(this.base.cidades[i][1], this.base.cidades[i]); },
    porKm: function(v) {
        if(!v) return;
        const km = parseFloat(v);
        const row = this.base.cidades.reduce((p, c) => Math.abs(c[1]-km) < Math.abs(p[1]-km) ? c : p);
        this.calc(km, row);
    },
    calc: function(kmIda, row) {
        document.getElementById('tab-kmBox').style.display = 'block';
        document.getElementById('tab-kmTotal').innerText = (kmIda * 2);
        const veiculos = [{n:'Toco', e:2, col:2}, {n:'Truck', e:3, col:3}, {n:'Bitruck', e:4, col:4}, {n:'Carreta', e:5, col:5}];
        let h = '';
        veiculos.forEach(v => {
            const c = this.base.antt[v.e];
            const vMin = (kmIda * c.ccd + c.cc) + (kmIda * c.ccd * 0.92);
            let pP = typeof row[v.col] === 'string' ? parseFloat(row[v.col].replace(/\./g,'').replace(',','.')) : row[v.col];
            h += `
            <div class="item-tab">
                <div style="display:flex; justify-content:space-between; align-items:flex-end">
                    <div class="veiculo-info">
                        <b>${v.n}</b>
                        <small>Mínimo ANTT: R$ ${vMin.toLocaleString('pt-BR',{minimumFractionDigits:2})}</small>
                    </div>
                    <div style="text-align:right">
                        <span class="price-final">R$ ${pP.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
                        ${pP < vMin ? '<span class="alerta-lei">ABAIXO DO PISO</span>' : ''}
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('tab-lista').innerHTML = h;
    }
};

const MapApp = {
    map: null, pontos: [], routing: null,
    init: function() {
        this.map = L.map('map-container', {zoomControl: false}).setView([-16.68, -49.25], 5);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(this.map);
    },
    handleEnter: function(e) {
        if(e.key !== 'Enter') return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}&limit=3`)
        .then(r => r.json()).then(d => {
            let h = '';
            d.forEach(i => h += `<div style="padding:18px; border-bottom:1px solid #eee; font-weight:600" onclick="MapApp.add(${i.lat},${i.lon},'${i.display_name.split(',')[0]}')">${i.display_name}</div>`);
            document.getElementById('map-sugestoes').innerHTML = h;
            document.getElementById('map-sugestoes').style.display = 'block';
        });
    },
    add: function(lat, lon, nome) {
        this.pontos.push({ latlng: L.latLng(lat, lon), nome });
        document.getElementById('map-sugestoes').style.display = 'none';
        document.getElementById('map-busca').value = '';
        if(this.pontos.length >= 2) this.desenhar();
    },
    desenhar: function() {
        if(this.routing) this.map.removeControl(this.routing);
        this.routing = L.Routing.control({
            waypoints: this.pontos.map(p => p.latlng),
            lineOptions: { styles: [{ color: 'var(--orange)', weight: 8 }] }
        }).addTo(this.map);
    },
    whatsapp: function() {
        alert("Relatório enviado!");
    }
};

const OrdApp = {
    prods: [],
    sync: function() {
        document.getElementById('v-mot').innerText = document.getElementById('ord-mot').value.toUpperCase() || '---';
        document.getElementById('v-pla').innerText = document.getElementById('ord-pla').value.toUpperCase() || '---';
    },
    addProd: function() {
        const t = document.getElementById('ord-tipo').value;
        const v = document.getElementById('ord-vol').value;
        if(!v) return;
        this.prods.push({t, v});
        let h = '';
        this.prods.forEach(p => h += `<div style="border-bottom:3px solid #000; padding:15px; text-align:center;"><b>${p.t}</b><br><span style="font-size:35px; font-weight:900; color:var(--danger)">${p.v} L</span></div>`);
        document.getElementById('v-prods').innerHTML = h;
        document.getElementById('ord-vol').value = '';
    },
    exportar: function() {
        html2canvas(document.getElementById('ord-canvas')).then(c => {
            const l = document.createElement('a');
            l.download = `ORDEM_${document.getElementById('ord-pla').value}.jpg`;
            l.href = c.toDataURL("image/jpeg", 0.9);
            l.click();
        });
    }
};

window.onload = () => { TabApp.init(); MapApp.init(); };
</script>

</body>
</html>
