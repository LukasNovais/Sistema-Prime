<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Transportadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .tab-content { display: none; height: calc(100vh - 145px); width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 16px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .nav-button.active { 
            color: #f59e0b !important; 
            border-top: 4px solid #f59e0b; 
            background: linear-gradient(to bottom, rgba(245, 158, 11, 0.15), transparent);
        }
        /* Cor dos ícones quando não estão ativos */
        .nav-button svg { fill: currentColor; width: 26px; height: 26px; margin-bottom: 4px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 flex flex-col h-screen overflow-hidden">

    <header class="bg-[#1e293b]/80 backdrop-blur-xl border-b border-slate-700/50 p-5 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-lg shadow-lg">
                    <svg viewBox="0 0 640 512" class="w-6 h-6 fill-[#0f172a]"><path d="M624 352h-16V243.9c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm80-208H416V144h44.1l99.9 99.9V256z"/></svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter uppercase italic">Sistema Prime <span class="text-amber-500 text-[10px] not-italic opacity-80">v2.6</span></h1>
                    <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">Central de Operações</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-600/50">
                <div class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></div>
                <span class="text-[9px] font-bold text-slate-300 uppercase">Conectado</span>
            </div>
        </div>
    </header>

    <main class="flex-grow p-3">
        <section id="aba1" class="tab-content active"><iframe src="aba1.html"></iframe></section>
        <section id="aba2" class="tab-content"><iframe src="aba2.html"></iframe></section>
        <section id="aba3" class="tab-content"><iframe src="aba3.html"></iframe></section>
    </main>

    <nav class="bg-[#1e293b] border-t border-slate-700/50 flex justify-around items-center h-24 pb-6 z-50">
        
        <button onclick="openTab('aba1', this)" class="nav-button active flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all">
            <svg viewBox="0 0 512 512"><path d="M64 256V160H224V256H64zm0 64H224V416H64V320zM288 416V320H448V416H288zM448 256H288V160H448V256zM64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64z"/></svg>
            <span class="text-[10px] font-bold uppercase">Tabela</span>
        </button>
        
        <button onclick="openTab('aba2', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all">
            <svg viewBox="0 0 448 512"><path d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zM337 209L209 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L303 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/></svg>
            <span class="text-[10px] font-bold uppercase">Calculadora</span>
        </button>
        
        <button onclick="openTab('aba3', this)" class="nav-button flex flex-col items-center justify-center w-full h-full text-slate-500 transition-all">
            <svg viewBox="0 0 384 512"><path d="M192 0c-41.8 0-77.4 26.7-90.5 64H64C28.7 64 0 92.7 0 128V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V128c0-35.3-28.7-64-64-64H282.5C269.4 26.7 233.8 0 192 0zm0 64a32 32 0 1 1 0 64 32 32 0 1 1 0-64zM112 192H272c8.8 0 16 7.2 16 16s-7.2 16-16 16H112c-8.8 0-16-7.2-16-16s7.2-16 16-16zM64 272c0-8.8 7.2-16 16-16H304c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16zM80 352H208c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16s7.2-16 16-16z"/></svg>
            <span class="text-[10px] font-bold uppercase">Ordem</span>
        </button>
        
    </nav>

    <script>
        function openTab(tabId, btn) {
            if (navigator.vibrate) navigator.vibrate(5);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-slate-400');
            });
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            btn.classList.remove('text-slate-400');
        }
    </script>
</body>
</html>
