<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prime Transportadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0f1d;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Viewport principal ocupa o espaço restante */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tab-content { 
            display: none; 
            width: 100%;
            height: 100%;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active { display: block; }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* NAVBAR REFORMULADA PARA MOBILE */
        nav {
            background-color: #161e2e;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            
            /* ESTA É A CHAVE: Adiciona espaço extra embaixo para a barra do iPhone/Android */
            padding-bottom: env(safe-area-inset-bottom); 
            height: calc(80px + env(safe-area-inset-bottom)); 
            
            width: 100%;
            z-index: 9999; /* Garante que fique no topo de tudo */
        }

        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-decoration: none;
            background: none;
            border: none;
            padding: 10px 0;
            transition: all 0.2s;
        }

        .nav-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-bottom: 4px;
        }

        .nav-link span {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-link.active {
            color: #f59e0b;
        }

        /* Indicador de aba ativa */
        .nav-link.active::after {
            content: "";
            position: absolute;
            top: 0;
            width: 30px;
            height: 3px;
            background: #f59e0b;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
<body>

    <header class="bg-[#161e2e]/95 backdrop-blur-md border-b border-white/5 p-4 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-lg">
                    <svg viewBox="0 0 640 512" class="w-5 h-5 fill-[#0a0f1d]"><path d="M624 352h-16V243.9c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm80-208H416V144h44.1l99.9 99.9V256z"/></svg>
                </div>
                <div>
                    <h1 class="text-white text-sm font-black italic uppercase leading-none">Sistema Prime</h1>
                    <p class="text-[9px] text-amber-500/80 font-bold tracking-widest mt-1">OPERACIONAL ONLINE</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="aba1" class="tab-content active"><iframe src="aba1.html"></iframe></section>
        <section id="aba2" class="tab-content"><iframe src="aba2.html"></iframe></section>
        <section id="aba3" class="tab-content"><iframe src="aba3.html"></iframe></section>
    </main>

    <nav>
        <button onclick="openTab('aba1', this)" class="nav-link active">
            <svg viewBox="0 0 512 512"><path d="M64 256V160H224V256H64zm0 64H224V416H64V320zM288 416V320H448V416H288zM448 256H288V160H448V256zM64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64z"/></svg>
            <span>Tabela</span>
        </button>
        
        <button onclick="openTab('aba2', this)" class="nav-link">
            <svg viewBox="0 0 448 512"><path d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zM337 209L209 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L303 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/></svg>
            <span>Calculadora</span>
        </button>
        
        <button onclick="openTab('aba3', this)" class="nav-link">
            <svg viewBox="0 0 384 512"><path d="M192 0c-41.8 0-77.4 26.7-90.5 64H64C28.7 64 0 92.7 0 128V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V128c0-35.3-28.7-64-64-64H282.5C269.4 26.7 233.8 0 192 0zm0 64a32 32 0 1 1 0 64 32 32 0 1 1 0-64zM112 192H272c8.8 0 16 7.2 16 16s-7.2 16-16 16H112c-8.8 0-16-7.2-16-16s7.2-16 16-16zM64 272c0-8.8 7.2-16 16-16H304c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16zM80 352H208c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16s7.2-16 16-16z"/></svg>
            <span>Ordem</span>
        </button>
    </nav>

    <script>
        function openTab(tabId, btn) {
            if (navigator.vibrate) navigator.vibrate(5);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Impede o comportamento de "puxar para atualizar" que pode esconder o menu
        document.addEventListener('touchstart', function(e) {
            if (e.touches[0].pageY < 10) return; // permite no topo
        }, {passive: true});
    </script>
</body>
</html>
