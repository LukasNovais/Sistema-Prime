<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prime Transportadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg-deep: #0a0f1d;
            --card-dark: #161e2e;
            --accent: #f59e0b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal com Safe Area para iPhone/Android moderno */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Conteúdo das Abas */
        .tab-content { 
            display: none; 
            flex: 1;
            width: 100%;
            height: 100%;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tab-content.active { display: block; }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            background: var(--bg-deep);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo do Botão Ativo */
        .nav-link.active {
            color: var(--accent);
        }

        .nav-link.active svg {
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.4));
            transform: translateY(-2px);
        }

        .nav-link.active span {
            font-weight: 800;
        }

        /* Indicador visual de aba ativa (o tracinho em cima) */
        .nav-link.active::before {
            content: "";
            position: absolute;
            top: 0;
            width: 40px;
            height: 4px;
            background: var(--accent);
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="bg-[#161e2e]/90 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                    <svg viewBox="0 0 640 512" class="w-6 h-6 fill-[#0a0f1d]"><path d="M624 352h-16V243.9c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm80-208H416V144h44.1l99.9 99.9V256z"/></svg>
                </div>
                <div>
                    <h1 class="text-white text-base font-extrabold tracking-tight leading-none italic uppercase">Sistema Prime</h1>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Operação Online</span>
                    </div>
                </div>
            </div>
            
            <button class="bg-white/5 p-2 rounded-lg border border-white/10 text-slate-400">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path fill-rule="evenodd" d="M1.323 11.447C2.811 6.976 7.028 3.75 12.001 3.75c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113-1.487 4.471-5.705 7.697-10.677 7.697-4.97 0-9.186-3.223-10.675-7.69a1.762 1.762 0 010-1.113zM17.25 12.001a5.25 5.25 0 11-10.5 0 5.25 5.25 0 0110.5 0z" clip-rule="evenodd"/></svg>
            </button>
        </header>

        <main class="flex-1 relative bg-[#0a0f1d]">
            <section id="aba1" class="tab-content active"><iframe src="aba1.html"></iframe></section>
            <section id="aba2" class="tab-content"><iframe src="aba2.html"></iframe></section>
            <section id="aba3" class="tab-content"><iframe src="aba3.html"></iframe></section>
        </main>

        <nav class="bg-[#161e2e] border-t border-white/5 flex justify-around items-stretch h-20 relative px-2">
            
            <button onclick="openTab('aba1', this)" class="nav-link active flex-1 flex flex-col items-center justify-center relative text-slate-500 transition-all">
                <svg viewBox="0 0 512 512" class="w-6 h-6 mb-1 fill-currentColor"><path d="M64 256V160H224V256H64zm0 64H224V416H64V320zM288 416V320H448V416H288zM448 256H288V160H448V256zM64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64z"/></svg>
                <span class="text-[10px] uppercase tracking-tighter">Tabela</span>
            </button>
            
            <button onclick="openTab('aba2', this)" class="nav-link flex-1 flex flex-col items-center justify-center relative text-slate-500 transition-all">
                <svg viewBox="0 0 448 512" class="w-6 h-6 mb-1 fill-currentColor"><path d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zM337 209L209 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L303 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/></svg>
                <span class="text-[10px] uppercase tracking-tighter">Calculadora</span>
            </button>
            
            <button onclick="openTab('aba3', this)" class="nav-link flex-1 flex flex-col items-center justify-center relative text-slate-500 transition-all">
                <svg viewBox="0 0 384 512" class="w-6 h-6 mb-1 fill-currentColor"><path d="M192 0c-41.8 0-77.4 26.7-90.5 64H64C28.7 64 0 92.7 0 128V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V128c0-35.3-28.7-64-64-64H282.5C269.4 26.7 233.8 0 192 0zm0 64a32 32 0 1 1 0 64 32 32 0 1 1 0-64zM112 192H272c8.8 0 16 7.2 16 16s-7.2 16-16 16H112c-8.8 0-16-7.2-16-16s7.2-16 16-16zM64 272c0-8.8 7.2-16 16-16H304c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16zM80 352H208c8.8 0 16 7.2 16 16s-7.2 16-16 16H80c-8.8 0-16-7.2-16-16s7.2-16 16-16z"/></svg>
                <span class="text-[10px] uppercase tracking-tighter">Ordem</span>
            </button>
            
        </nav>
    </div>

    <script>
        function openTab(tabId, btn) {
            // Vibração curta de feedback tátil
            if (navigator.vibrate) navigator.vibrate(8);

            // Gerenciar Visibilidade
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Impede scroll elástico na página principal (mantendo o app fixo)
        document.addEventListener('touchmove', function (e) {
            if (e.target.tagName !== 'IFRAME') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
